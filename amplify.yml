version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Deploys the backend (auth, data, lead-intake function) and writes
        # amplify_outputs.json — including the lead-intake Function URL —
        # to the workspace root before the frontend phase runs.
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        # Workaround for aws-amplify/amplify-backend#2190: Hosting env vars
        # aren't auto-injected into the Vite build. Anything set as a
        # Hosting env var with the VITE_ prefix is forwarded into a .env
        # file so import.meta.env can see it. Safe no-op when nothing is set.
        - env | grep -E '^VITE_' >> .env || true
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
